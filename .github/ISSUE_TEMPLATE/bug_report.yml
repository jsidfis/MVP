name: Bug 报告
description: 报告可复现的问题
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        请不要上传 SQLite 数据库、私人任务记录、token、密钥或包含私人内容的截图。
  - type: input
    id: app-version
    attributes:
      label: 应用版本
      placeholder: "例如：0.2.0"
    validations:
      required: true
  - type: input
    id: windows-version
    attributes:
      label: Windows 版本
      placeholder: "例如：Windows 11 23H2"
    validations:
      required: true
  - type: dropdown
    id: run-mode
    attributes:
      label: 运行方式
      options:
        - 便携 zip
        - npm.cmd run tauri:dev:gnu
        - 本地源码构建
        - 其他
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请写成可重复执行的步骤。
      placeholder: |
        1. 打开...
        2. 点击...
        3. 输入...
        4. 看到...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 相关日志或截图说明
      description: 只粘贴不含私人数据的内容。
  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私确认
      options:
        - label: 我确认没有上传 SQLite 数据库、私人任务记录、token、密钥或高敏感信息。
          required: true
